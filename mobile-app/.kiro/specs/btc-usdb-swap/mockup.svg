<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Screen gradient: matches getGradientColors(dark) in the existing ZapArc app -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="0.5" stop-color="#16213e"/>
      <stop offset="1" stop-color="#0f3460"/>
    </linearGradient>
    <!-- Card fill: translucent surface -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Overlay backdrop for modal state -->
    <linearGradient id="backdrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Amber accent ring glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFC107" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
    <!-- Phone frame drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="900" fill="#0a0a14"/>
  <text x="640" y="40" text-anchor="middle" fill="#FFC107" font-size="16" font-weight="600" letter-spacing="2">ZAPARC · BTC ⇄ USDB SWAP · CONCEPT MOCKUP</text>
  <text x="640" y="62" text-anchor="middle" fill="#9ca3b0" font-size="11">Design decisions locked by spec · Fabricated rates for illustration</text>

  <!-- =========================================================== -->
  <!-- SCREEN 1 · QUOTE LOADED                                      -->
  <!-- =========================================================== -->
  <g transform="translate(40,90)" filter="url(#shadow)">
    <!-- phone frame -->
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>
    <!-- notch -->
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>
    <!-- status bar -->
    <text x="28" y="48" fill="#fff" font-size="13" font-weight="600">9:41</text>
    <text x="330" y="48" fill="#fff" font-size="13">􀋦 􀊫 􀛨</text>

    <!-- header -->
    <g transform="translate(0,78)">
      <path d="M 26 12 L 14 20 L 26 28" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="190" y="25" text-anchor="middle" fill="#fff" font-size="17" font-weight="600">Swap</text>
    </g>

    <!-- Balance hint above cards -->
    <text x="28" y="142" fill="#9ca3b0" font-size="11" letter-spacing="1">YOU PAY</text>
    <!-- You-pay card -->
    <g transform="translate(20,152)">
      <rect width="340" height="104" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="20" y="28" fill="#9ca3b0" font-size="12">Balance: 120,000 sats</text>
      <text x="20" y="66" fill="#fff" font-size="30" font-weight="500">10,000</text>
      <text x="20" y="88" fill="#9ca3b0" font-size="12">≈ $6.50</text>
      <text x="320" y="66" text-anchor="end" fill="#FFC107" font-size="15" font-weight="600">BTC</text>
      <!-- Max pill -->
      <rect x="244" y="76" width="76" height="18" rx="9" fill="#FFC107" fill-opacity="0.15" stroke="#FFC107" stroke-opacity="0.4"/>
      <text x="282" y="89" text-anchor="middle" fill="#FFC107" font-size="10" font-weight="600" letter-spacing="0.5">MAX</text>
    </g>

    <!-- Flip button -->
    <g transform="translate(170,270)">
      <circle cx="20" cy="20" r="26" fill="url(#glow)"/>
      <circle cx="20" cy="20" r="18" fill="#1a1a2e" stroke="#FFC107" stroke-width="1.5"/>
      <path d="M 12 16 L 28 16 M 24 12 L 28 16 L 24 20 M 12 24 L 28 24 M 16 20 L 12 24 L 16 28" stroke="#FFC107" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="28" y="340" fill="#9ca3b0" font-size="11" letter-spacing="1">YOU RECEIVE</text>
    <!-- You-receive card -->
    <g transform="translate(20,350)">
      <rect width="340" height="104" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="20" y="28" fill="#9ca3b0" font-size="12">Balance: 0.00 USDB</text>
      <text x="20" y="66" fill="#fff" font-size="30" font-weight="500">6.48</text>
      <text x="20" y="88" fill="#9ca3b0" font-size="12">Best rate available</text>
      <text x="320" y="66" text-anchor="end" fill="#FFC107" font-size="15" font-weight="600">USDB</text>
    </g>

    <!-- Rate line -->
    <g transform="translate(20,476)">
      <rect width="340" height="86" rx="12" fill="#ffffff" fill-opacity="0.03"/>
      <text x="16" y="24" fill="#9ca3b0" font-size="12">Rate</text>
      <text x="324" y="24" text-anchor="end" fill="#fff" font-size="12">1 BTC = $65,000</text>
      <text x="16" y="48" fill="#9ca3b0" font-size="12">Fee</text>
      <text x="324" y="48" text-anchor="end" fill="#fff" font-size="12">21 sats · ≈ $0.014</text>
      <text x="16" y="72" fill="#9ca3b0" font-size="12">Slippage</text>
      <text x="324" y="72" text-anchor="end" fill="#FFC107" font-size="12" font-weight="500">0.5% ⌵ Advanced</text>
    </g>

    <!-- Review button (active) -->
    <g transform="translate(20,598)">
      <rect width="340" height="56" rx="14" fill="#FFC107"/>
      <text x="170" y="36" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="700" letter-spacing="0.3">Review Swap</text>
    </g>

    <!-- subtle quote-valid timer tick -->
    <g transform="translate(170,672)">
      <circle cx="0" cy="0" r="3" fill="#4ade80"/>
      <text x="10" y="4" fill="#9ca3b0" font-size="11">Quote valid · re-checks in 10s</text>
    </g>

    <!-- home indicator -->
    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <!-- Label -->
  <text x="230" y="880" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">① QUOTE LOADED</text>

  <!-- =========================================================== -->
  <!-- SCREEN 2 · REVIEW MODAL (screen 1 with overlay + dialog)     -->
  <!-- =========================================================== -->
  <g transform="translate(450,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>

    <!-- faded background of screen 1 -->
    <g opacity="0.35">
      <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>
      <g transform="translate(20,152)">
        <rect width="340" height="104" rx="16" fill="url(#card)"/>
      </g>
      <g transform="translate(20,350)">
        <rect width="340" height="104" rx="16" fill="url(#card)"/>
      </g>
    </g>
    <!-- notch on top (full opacity) -->
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>

    <!-- scrim -->
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#backdrop)"/>

    <!-- dialog -->
    <g transform="translate(20,210)" filter="url(#shadow)">
      <rect width="340" height="448" rx="20" fill="#1a1a2e" stroke="#FFC107" stroke-opacity="0.15"/>
      <!-- title -->
      <text x="170" y="44" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Review Swap</text>
      <line x1="20" y1="66" x2="320" y2="66" stroke="#ffffff" stroke-opacity="0.08"/>

      <!-- direction row -->
      <g transform="translate(20,88)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">Direction</text>
        <g transform="translate(224,4)">
          <text x="0" y="12" fill="#fff" font-size="12" font-weight="600">BTC</text>
          <path d="M 28 8 L 42 8 M 39 5 L 42 8 L 39 11" stroke="#FFC107" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <text x="48" y="12" fill="#fff" font-size="12" font-weight="600">USDB</text>
        </g>
      </g>

      <!-- You pay -->
      <g transform="translate(20,130)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">You pay</text>
        <text x="300" y="16" text-anchor="end" fill="#fff" font-size="14" font-weight="600">10,000 sats</text>
        <text x="300" y="32" text-anchor="end" fill="#9ca3b0" font-size="11">≈ $6.50</text>
      </g>

      <!-- You receive -->
      <g transform="translate(20,182)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">You receive</text>
        <text x="300" y="16" text-anchor="end" fill="#fff" font-size="14" font-weight="600">6.48 USDB</text>
        <text x="300" y="32" text-anchor="end" fill="#9ca3b0" font-size="11">min 6.45 (after slippage)</text>
      </g>

      <!-- Rate -->
      <g transform="translate(20,234)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">Rate</text>
        <text x="300" y="16" text-anchor="end" fill="#fff" font-size="13">1 BTC = $65,000</text>
      </g>

      <!-- Fee -->
      <g transform="translate(20,266)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">Fee</text>
        <text x="300" y="16" text-anchor="end" fill="#fff" font-size="13">21 sats</text>
      </g>

      <!-- Slippage -->
      <g transform="translate(20,298)">
        <text x="0" y="16" fill="#9ca3b0" font-size="12">Slippage tolerance</text>
        <text x="300" y="16" text-anchor="end" fill="#fff" font-size="13">0.5%</text>
      </g>

      <line x1="20" y1="336" x2="320" y2="336" stroke="#ffffff" stroke-opacity="0.08"/>

      <!-- actions -->
      <g transform="translate(20,360)">
        <rect width="140" height="56" rx="14" fill="transparent" stroke="#9ca3b0" stroke-opacity="0.5"/>
        <text x="70" y="36" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Cancel</text>
      </g>
      <g transform="translate(180,360)">
        <rect width="140" height="56" rx="14" fill="#FFC107"/>
        <text x="70" y="36" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">Confirm →</text>
      </g>
    </g>

    <!-- subtle hint under dialog -->
    <text x="194" y="686" text-anchor="middle" fill="#9ca3b0" font-size="10" opacity="0.7">Confirm uses biometric / PIN</text>

    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <text x="640" y="880" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">② REVIEW MODAL</text>

  <!-- =========================================================== -->
  <!-- SCREEN 3 · SUCCESS                                           -->
  <!-- =========================================================== -->
  <g transform="translate(860,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>
    <text x="28" y="48" fill="#fff" font-size="13" font-weight="600">9:41</text>
    <text x="330" y="48" fill="#fff" font-size="13">􀋦 􀊫 􀛨</text>

    <!-- header -->
    <text x="190" y="103" text-anchor="middle" fill="#fff" font-size="17" font-weight="600">Swap</text>

    <!-- Success hero -->
    <g transform="translate(190,240)">
      <!-- glow -->
      <circle cx="0" cy="0" r="72" fill="url(#glow)"/>
      <!-- ring -->
      <circle cx="0" cy="0" r="48" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
      <!-- checkmark -->
      <path d="M -20 2 L -6 16 L 22 -14" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="190" y="342" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">Swap complete</text>
    <text x="190" y="366" text-anchor="middle" fill="#9ca3b0" font-size="13">Funds moved in under 10 seconds</text>

    <!-- Receipt card -->
    <g transform="translate(20,408)">
      <rect width="340" height="168" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <g transform="translate(20,32)">
        <text x="0" y="0" fill="#9ca3b0" font-size="12">Paid</text>
        <text x="300" y="0" text-anchor="end" fill="#fff" font-size="16" font-weight="600">10,000 sats</text>
      </g>
      <line x1="20" y1="52" x2="320" y2="52" stroke="#ffffff" stroke-opacity="0.06"/>
      <g transform="translate(20,80)">
        <text x="0" y="0" fill="#9ca3b0" font-size="12">Received</text>
        <text x="300" y="0" text-anchor="end" fill="#4ade80" font-size="16" font-weight="600">6.48 USDB</text>
      </g>
      <line x1="20" y1="100" x2="320" y2="100" stroke="#ffffff" stroke-opacity="0.06"/>
      <g transform="translate(20,128)">
        <text x="0" y="0" fill="#9ca3b0" font-size="12">Fee</text>
        <text x="300" y="0" text-anchor="end" fill="#fff" font-size="13">21 sats · ≈ $0.014</text>
      </g>
    </g>

    <!-- New balance hint -->
    <g transform="translate(20,604)">
      <rect width="340" height="54" rx="12" fill="#FFC107" fill-opacity="0.08" stroke="#FFC107" stroke-opacity="0.25"/>
      <text x="16" y="22" fill="#9ca3b0" font-size="11">NEW BALANCES</text>
      <text x="16" y="42" fill="#fff" font-size="13">109,979 sats</text>
      <text x="324" y="42" text-anchor="end" fill="#FFC107" font-size="13" font-weight="600">6.48 USDB</text>
    </g>

    <!-- Done button -->
    <g transform="translate(20,682)">
      <rect width="340" height="56" rx="14" fill="#FFC107"/>
      <text x="170" y="36" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="700">Done</text>
    </g>

    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <text x="1050" y="880" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">③ SUCCESS</text>
</svg>
