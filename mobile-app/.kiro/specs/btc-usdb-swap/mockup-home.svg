<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="0.5" stop-color="#16213e"/>
      <stop offset="1" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFC107" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="900" fill="#0a0a14"/>
  <text x="640" y="40" text-anchor="middle" fill="#FFC107" font-size="16" font-weight="600" letter-spacing="2">ZAPARC HOME · ASSET TABS</text>
  <text x="640" y="62" text-anchor="middle" fill="#9ca3b0" font-size="11">Same tab pattern as existing Send/Receive screens · BTC and USDB are peers · single Swap action per asset context</text>

  <!-- ============================= -->
  <!-- SCREEN 1: BTC TAB ACTIVE      -->
  <!-- ============================= -->
  <g transform="translate(60,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>

    <!-- header: wallet selector + icons (mimics existing HomeScreen) -->
    <g transform="translate(20,54)">
      <circle cx="16" cy="18" r="16" fill="rgba(255,255,255,0.08)"/>
      <text x="16" y="23" text-anchor="middle" font-size="14">💰</text>
      <text x="42" y="15" fill="#fff" font-size="13" font-weight="600">Personal</text>
      <text x="42" y="30" fill="#9ca3b0" font-size="11">Main wallet ⌄</text>
      <!-- icon buttons: eye, lock, cog -->
      <g transform="translate(238,8)">
        <circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/>
        <text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">👁</text>
      </g>
      <g transform="translate(278,8)">
        <circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/>
        <text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">🔒</text>
      </g>
      <g transform="translate(318,8)">
        <circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/>
        <text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">⚙</text>
      </g>
    </g>

    <!-- ASSET TAB BAR (new) — mirrors send.tsx styles.tabContainer -->
    <g transform="translate(20,110)">
      <rect width="340" height="44" rx="14" fill="rgba(255,255,255,0.08)"/>
      <!-- Active: BTC -->
      <g transform="translate(5,5)">
        <rect width="165" height="34" rx="10" fill="#FFC107"/>
        <text x="82" y="22" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">BTC</text>
      </g>
      <!-- Inactive: USDB -->
      <g transform="translate(175,5)">
        <rect width="160" height="34" rx="10" fill="transparent"/>
        <text x="80" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.9">USDB</text>
      </g>
    </g>

    <!-- balance card (existing BTC behavior — unchanged) -->
    <g transform="translate(20,180)">
      <rect width="340" height="112" rx="16" fill="url(#card)"/>
      <text x="170" y="26" text-anchor="middle" fill="#9ca3b0" font-size="11" letter-spacing="2">BALANCE</text>
      <text x="170" y="64" text-anchor="middle" fill="#fff" font-size="32" font-weight="700">109,979 sats</text>
      <text x="170" y="88" text-anchor="middle" fill="#9ca3b0" font-size="12">≈ $71.48</text>
    </g>

    <!-- quick actions: Send · Receive · Swap (NEW) · Scan -->
    <g transform="translate(0,320)">
      <g transform="translate(42,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <path d="M 16 32 L 32 16 M 22 16 L 32 16 L 32 26" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Send</text>
      </g>
      <g transform="translate(122,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <path d="M 32 16 L 16 32 M 16 22 L 16 32 L 26 32" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Receive</text>
      </g>
      <g transform="translate(202,0)">
        <circle cx="24" cy="24" r="30" fill="url(#glow)"/>
        <circle cx="24" cy="24" r="22" fill="#FFC107" fill-opacity="0.15" stroke="#FFC107" stroke-width="1.5"/>
        <path d="M 14 20 L 34 20 M 30 17 L 34 20 L 30 23 M 34 28 L 14 28 M 18 25 L 14 28 L 18 31" stroke="#FFC107" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#FFC107" font-size="11" font-weight="600">Swap</text>
        <!-- NEW badge -->
        <g transform="translate(38,-4)">
          <rect x="0" y="0" width="26" height="13" rx="6" fill="#4ade80"/>
          <text x="13" y="9" text-anchor="middle" fill="#0a0a14" font-size="7" font-weight="700">NEW</text>
        </g>
      </g>
      <g transform="translate(282,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <rect x="14" y="14" width="20" height="20" rx="3" stroke="#fff" stroke-width="2" fill="none"/>
        <rect x="18" y="18" width="4" height="4" fill="#fff"/>
        <rect x="26" y="18" width="4" height="4" fill="#fff"/>
        <rect x="18" y="26" width="4" height="4" fill="#fff"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Scan</text>
      </g>
    </g>

    <!-- transactions -->
    <g transform="translate(20,430)">
      <text x="0" y="0" fill="#9ca3b0" font-size="11" letter-spacing="1">RECENT ACTIVITY</text>
      <g transform="translate(0,16)">
        <rect width="340" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
        <text x="14" y="28" fill="#FFC107" font-size="16">⚡</text>
        <text x="40" y="22" fill="#fff" font-size="13">Swap · BTC → USDB</text>
        <text x="40" y="38" fill="#9ca3b0" font-size="11">2 min ago</text>
        <text x="326" y="22" text-anchor="end" fill="#f87171" font-size="13" font-weight="600">−10,000 sats</text>
        <text x="326" y="38" text-anchor="end" fill="#9ca3b0" font-size="10">+6.48 USDB</text>
      </g>
      <g transform="translate(0,72)">
        <rect width="340" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
        <text x="14" y="28" fill="#4ade80" font-size="16">⚡</text>
        <text x="40" y="22" fill="#fff" font-size="13">Received</text>
        <text x="40" y="38" fill="#9ca3b0" font-size="11">Yesterday</text>
        <text x="326" y="22" text-anchor="end" fill="#4ade80" font-size="13" font-weight="600">+50,000 sats</text>
      </g>
      <g transform="translate(0,128)">
        <rect width="340" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
        <text x="14" y="28" fill="#ffffff" font-size="16" opacity="0.8">⛓️</text>
        <text x="40" y="22" fill="#fff" font-size="13">Sent (on-chain)</text>
        <text x="40" y="38" fill="#9ca3b0" font-size="11">3 days ago</text>
        <text x="326" y="22" text-anchor="end" fill="#fff" font-size="13" font-weight="600">−21,000 sats</text>
      </g>
    </g>

    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <text x="250" y="885" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">① BTC TAB · IDENTICAL TO TODAY (+ new Swap action)</text>

  <!-- ============================= -->
  <!-- SCREEN 2: USDB TAB ACTIVE     -->
  <!-- ============================= -->
  <g transform="translate(470,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>

    <g transform="translate(20,54)">
      <circle cx="16" cy="18" r="16" fill="rgba(255,255,255,0.08)"/>
      <text x="16" y="23" text-anchor="middle" font-size="14">💰</text>
      <text x="42" y="15" fill="#fff" font-size="13" font-weight="600">Personal</text>
      <text x="42" y="30" fill="#9ca3b0" font-size="11">Main wallet ⌄</text>
      <g transform="translate(238,8)"><circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/><text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">👁</text></g>
      <g transform="translate(278,8)"><circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/><text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">🔒</text></g>
      <g transform="translate(318,8)"><circle cx="10" cy="10" r="12" fill="#ffffff" fill-opacity="0.06"/><text x="10" y="14" text-anchor="middle" fill="#fff" font-size="11" opacity="0.8">⚙</text></g>
    </g>

    <!-- ASSET TAB BAR: USDB ACTIVE -->
    <g transform="translate(20,110)">
      <rect width="340" height="44" rx="14" fill="rgba(255,255,255,0.08)"/>
      <g transform="translate(5,5)">
        <rect width="165" height="34" rx="10" fill="transparent"/>
        <text x="82" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.9">BTC</text>
      </g>
      <g transform="translate(175,5)">
        <rect width="160" height="34" rx="10" fill="#FFC107"/>
        <text x="80" y="22" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">USDB</text>
      </g>
    </g>

    <!-- USDB balance card -->
    <g transform="translate(20,180)">
      <rect width="340" height="112" rx="16" fill="url(#card)"/>
      <text x="170" y="26" text-anchor="middle" fill="#9ca3b0" font-size="11" letter-spacing="2">BALANCE</text>
      <text x="170" y="64" text-anchor="middle" fill="#fff" font-size="32" font-weight="700">6.48 USDB</text>
      <text x="170" y="88" text-anchor="middle" fill="#9ca3b0" font-size="12">≈ $6.48</text>
    </g>

    <!-- quick actions for USDB tab -->
    <g transform="translate(0,320)">
      <g transform="translate(42,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <path d="M 16 32 L 32 16 M 22 16 L 32 16 L 32 26" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Send</text>
      </g>
      <g transform="translate(122,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <path d="M 32 16 L 16 32 M 16 22 L 16 32 L 26 32" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Receive</text>
      </g>
      <g transform="translate(202,0)">
        <circle cx="24" cy="24" r="22" fill="#FFC107" fill-opacity="0.15" stroke="#FFC107" stroke-width="1.5"/>
        <path d="M 14 20 L 34 20 M 30 17 L 34 20 L 30 23 M 34 28 L 14 28 M 18 25 L 14 28 L 18 31" stroke="#FFC107" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="66" text-anchor="middle" fill="#FFC107" font-size="11" font-weight="600">Swap</text>
      </g>
      <g transform="translate(282,0)">
        <circle cx="24" cy="24" r="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
        <rect x="14" y="14" width="20" height="20" rx="3" stroke="#fff" stroke-width="2" fill="none"/>
        <rect x="18" y="18" width="4" height="4" fill="#fff"/>
        <rect x="26" y="18" width="4" height="4" fill="#fff"/>
        <rect x="18" y="26" width="4" height="4" fill="#fff"/>
        <text x="24" y="66" text-anchor="middle" fill="#fff" font-size="11">Scan</text>
      </g>
    </g>

    <!-- USDB transactions (swap entry shown from USDB perspective) -->
    <g transform="translate(20,430)">
      <text x="0" y="0" fill="#9ca3b0" font-size="11" letter-spacing="1">RECENT ACTIVITY</text>
      <g transform="translate(0,16)">
        <rect width="340" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
        <text x="14" y="28" fill="#4ade80" font-size="15">$</text>
        <text x="40" y="22" fill="#fff" font-size="13">Swap · BTC → USDB</text>
        <text x="40" y="38" fill="#9ca3b0" font-size="11">2 min ago</text>
        <text x="326" y="22" text-anchor="end" fill="#4ade80" font-size="13" font-weight="600">+6.48 USDB</text>
        <text x="326" y="38" text-anchor="end" fill="#9ca3b0" font-size="10">−10,000 sats</text>
      </g>
      <text x="170" y="96" text-anchor="middle" fill="#6b7280" font-size="11" opacity="0.7">No other USDB activity</text>
    </g>

    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <text x="660" y="885" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">② USDB TAB · has balance &gt; 0</text>

  <!-- ============================= -->
  <!-- SCREEN 3: USDB ZERO STATE     -->
  <!-- ============================= -->
  <g transform="translate(880,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="780" rx="44" fill="#000"/>
    <rect x="4" y="4" width="372" height="772" rx="40" fill="url(#bg)"/>
    <rect x="150" y="10" width="80" height="22" rx="11" fill="#000"/>

    <g transform="translate(20,54)">
      <circle cx="16" cy="18" r="16" fill="rgba(255,255,255,0.08)"/>
      <text x="16" y="23" text-anchor="middle" font-size="14">💰</text>
      <text x="42" y="15" fill="#fff" font-size="13" font-weight="600">Personal</text>
      <text x="42" y="30" fill="#9ca3b0" font-size="11">Main wallet ⌄</text>
    </g>

    <g transform="translate(20,110)">
      <rect width="340" height="44" rx="14" fill="rgba(255,255,255,0.08)"/>
      <g transform="translate(5,5)">
        <rect width="165" height="34" rx="10" fill="transparent"/>
        <text x="82" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" opacity="0.9">BTC</text>
      </g>
      <g transform="translate(175,5)">
        <rect width="160" height="34" rx="10" fill="#FFC107"/>
        <text x="80" y="22" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="700">USDB</text>
      </g>
    </g>

    <!-- zero-state balance card -->
    <g transform="translate(20,200)">
      <!-- big $ icon -->
      <g transform="translate(170,40)">
        <circle cx="0" cy="0" r="48" fill="url(#glow)"/>
        <circle cx="0" cy="0" r="34" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1.5"/>
        <text x="0" y="12" text-anchor="middle" fill="#4ade80" font-size="34" font-weight="700">$</text>
      </g>
      <text x="170" y="124" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">No USDB yet</text>
      <text x="170" y="150" text-anchor="middle" fill="#9ca3b0" font-size="13">Swap sats to USDB to get started</text>
    </g>

    <!-- big CTA -->
    <g transform="translate(20,430)">
      <rect width="340" height="56" rx="14" fill="#FFC107"/>
      <text x="170" y="36" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="700">Swap sats → USDB</text>
    </g>

    <!-- hint: Send/Receive hidden in zero-state -->
    <text x="190" y="530" text-anchor="middle" fill="#6b7280" font-size="11" opacity="0.6">Send and Receive appear once you have USDB</text>

    <!-- empty transaction area -->
    <g transform="translate(20,570)">
      <text x="0" y="0" fill="#9ca3b0" font-size="11" letter-spacing="1">RECENT ACTIVITY</text>
      <rect width="340" height="60" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-dasharray="4,4"/>
      <text x="170" y="38" text-anchor="middle" fill="#6b7280" font-size="12" opacity="0.7">No activity yet</text>
    </g>

    <rect x="140" y="754" width="100" height="4" rx="2" fill="#fff" fill-opacity="0.3"/>
  </g>

  <text x="1070" y="885" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">③ USDB TAB · zero-state</text>
</svg>
